<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="member-header">
    <div class="member-container">
        <h1 class="member-head">Save member name</h1>
        <div class="member-input-section">
            <input class="input-member" type="text" placeholder="Enter member name">
            <input class="input-member" type="number" placeholder="Enter member age">

            <div class="member-input-radio">
                <label for="male">Male</label>
                <input type="radio" name="gender" id="male" value="male" checked>
                <label for="female">Female</label>
                <input type="radio" name="gender" id="female" value="female">
            </div>
            <button class="btn-submit">Done</button>
        </div>
        
    
        
    </div>
   </div>





    <script src="main.js"></script>
</body>
</html>
